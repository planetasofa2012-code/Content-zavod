version: "3.8"

services:
  # === Telegram-бот (Python) ===
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: content-zavod-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Лендинг + дашборд (Next.js) ===
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: content-zavod-landing
    restart: unless-stopped
    env_file:
      - ./landing/.env.local
    expose:
      - "3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Nginx (прокси) ===
  nginx:
    image: nginx:alpine
    container_name: content-zavod-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - landing
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
