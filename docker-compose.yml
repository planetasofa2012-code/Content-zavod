version: "3.8"

services:
  agent-bot:
    build: .
    container_name: content-zavod-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Логи диалогов сохраняются на хосте (не теряются при пересборке)
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
